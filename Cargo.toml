[workspace]
resolver = "2"
members = [
    "crates/lsb-cli",
    "crates/lsb-platform",
    "crates/lsb-proto",
    "crates/lsb-proxy",
    "crates/lsb-sdk",
    "crates/lsb-service-spike",
    "crates/lsb-service-proto",
    "crates/lsb-service-client",
    "crates/lsb-seawork-service",
    "crates/lsb-vm",
    "crates/lsb-store",
    "crates/lsb-guest",
    "xtask",
]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.release.package.lsb-seawork-service]
debug = 1
strip = false
