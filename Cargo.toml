[workspace]
resolver = "2"
members = [
    "crates/shuru-cli",
    "crates/shuru-platform",
    "crates/shuru-proto",
    "crates/shuru-proxy",
    "crates/shuru-sdk",
    "crates/shuru-vm",
    "crates/shuru-guest",
    "xtask",
]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
