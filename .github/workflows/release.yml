name: Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "patch, minor, major, or an exact X.Y.Z version"
        required: true
        type: string
        default: patch

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  LSB_FORCE_DOCKER_ROOTFS: "1"

jobs:
  prepare:
    name: Prepare release commit
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
    outputs:
      publish-crates: ${{ steps.crates-config.outputs.enabled }}
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Detect optional crates.io publishing
        id: crates-config
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -n "$CARGO_REGISTRY_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare or resume release
        id: release
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          git fetch origin main --tags
          base_sha="$(git rev-parse HEAD)"
          remote_sha="$(git rev-parse origin/main)"
          if [[ "$base_sha" != "$remote_sha" ]]; then
            echo "main moved before release preparation; rerun the workflow" >&2
            exit 1
          fi

          current_version="$(cargo run -q -p xtask -- release current)"
          current_tag="v${current_version}"
          resume=false

          if [[ "$REQUESTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && git show-ref --verify --quiet "refs/tags/v${REQUESTED_VERSION}"; then
            current_version="$REQUESTED_VERSION"
            current_tag="v${current_version}"
            git checkout --detach "$current_tag"
            resume=true
          elif [[ "$REQUESTED_VERSION" == "$current_version" ]]; then
            resume=true
          elif [[ "$REQUESTED_VERSION" =~ ^(patch|minor|major)$ ]] && ! git show-ref --verify --quiet "refs/tags/${current_tag}"; then
            resume=true
          fi

          if [[ "$resume" == false ]]; then
            cargo run -p xtask -- release prepare "$REQUESTED_VERSION"
            current_version="$(cargo run -q -p xtask -- release current)"
            current_tag="v${current_version}"
          fi

          cargo run -p xtask -- release verify --version "$current_version"
          cargo metadata --locked --format-version 1 --no-deps >/dev/null

          unexpected="$(git diff --name-only | grep -Ev '^(Cargo\.toml|Cargo\.lock|bindings/nodejs/Cargo\.toml|bindings/nodejs/package\.json|bindings/nodejs/npm/[^/]+/package\.json)$' || true)"
          if [[ -n "$unexpected" ]]; then
            echo "release preparation changed files outside the allowlist:" >&2
            echo "$unexpected" >&2
            exit 1
          fi

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock bindings/nodejs/Cargo.toml bindings/nodejs/package.json bindings/nodejs/npm/*/package.json
            git commit -m "chore(release): prepare ${current_tag}"

            git fetch origin main
            if [[ "$(git rev-parse origin/main)" != "$base_sha" ]]; then
              echo "main moved during release preparation; rerun the workflow" >&2
              exit 1
            fi
            git push origin HEAD:main
          fi

          release_sha="$(git rev-parse HEAD)"
          if git show-ref --verify --quiet "refs/tags/${current_tag}"; then
            tagged_sha="$(git rev-list -n 1 "$current_tag")"
            if [[ "$tagged_sha" != "$release_sha" ]]; then
              echo "${current_tag} already points to ${tagged_sha}, not ${release_sha}" >&2
              exit 1
            fi
          fi

          {
            echo "sha=${release_sha}"
            echo "tag=${current_tag}"
            echo "version=${current_version}"
          } >> "$GITHUB_OUTPUT"

  ci:
    name: Rust validation
    needs: prepare
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}

  nodejs-build:
    name: Node.js validation and build
    needs: prepare
    uses: ./.github/workflows/nodejs-binding.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}

  build-os-image:
    name: Build OS image (${{ matrix.platform }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: ubuntu-24.04-arm
            guest_linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER
            guest_linker_bin: musl-gcc
          - platform: macos-x86_64
            runner: ubuntu-24.04
            guest_linker_env: CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER
            guest_linker_bin: musl-gcc
          - platform: windows-x86_64
            runner: ubuntu-24.04
            guest_linker_env: CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER
            guest_linker_bin: musl-gcc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve platform metadata
        run: cargo run -p xtask -- platform-meta --platform "${{ matrix.platform }}" --format env --version "${{ needs.prepare.outputs.tag }}" >> "$GITHUB_ENV"

      - run: rustup target add "${LSB_GUEST_TARGET}"

      - name: Install rootfs build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools build-essential bc flex bison \
            libelf-dev libssl-dev wget xz-utils

      - name: Build guest
        run: env "${{ matrix.guest_linker_env }}=${{ matrix.guest_linker_bin }}" cargo build -p lsb-guest --target "${LSB_GUEST_TARGET}" --release --locked

      - name: Build OS image
        run: cargo run -p xtask -- prepare-rootfs --platform "${{ matrix.platform }}"

      - name: Package OS image
        run: cargo run -p xtask -- package-release --platform "${{ matrix.platform }}" --artifact os-image --version "${{ needs.prepare.outputs.tag }}"

      - uses: actions/upload-artifact@v4
        with:
          name: os-image-${{ matrix.platform }}
          path: lsb-os-*.tar.gz
          retention-days: 7

  build-cli:
    name: Build CLI (${{ matrix.platform }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: macos-14
            rust_target: aarch64-apple-darwin
          - platform: macos-x86_64
            runner: macos-14
            rust_target: x86_64-apple-darwin
          - platform: windows-x86_64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Resolve platform metadata
        run: cargo run -p xtask -- platform-meta --platform "${{ matrix.platform }}" --format env --version "${{ needs.prepare.outputs.tag }}" >> "$GITHUB_ENV"

      - name: Build CLI
        run: cargo build -p lsb-cli --release --locked --target "${LSB_HOST_TARGET}"

      - name: Codesign
        if: ${{ startsWith(matrix.platform, 'macos-') }}
        run: codesign --entitlements "${LSB_CODESIGN_ENTITLEMENTS}" --force -s - "target/${LSB_HOST_TARGET}/release/${LSB_CLI_BINARY}"

      - name: Stage CLI artifact
        run: |
          mkdir -p target/release
          cp "target/${LSB_HOST_TARGET}/release/${LSB_CLI_BINARY}" "target/release/${LSB_CLI_BINARY}"

      - name: Package CLI
        run: cargo run -p xtask -- package-release --platform "${{ matrix.platform }}" --artifact cli --version "${{ needs.prepare.outputs.tag }}"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-binary-${{ matrix.platform }}
          path: lsb-*.tar.gz
          retention-days: 7

  validate-managed-qemu:
    name: Validate managed Windows QEMU artifact
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve managed QEMU metadata
        run: cargo run -p xtask -- platform-meta --platform windows-x86_64 --format env >> "$GITHUB_ENV"
      - name: Verify managed QEMU artifact
        run: |
          curl -fsSL "${LSB_MANAGED_QEMU_URL}" -o "${LSB_MANAGED_QEMU_TARBALL}"
          echo "${LSB_MANAGED_QEMU_SHA256}  ${LSB_MANAGED_QEMU_TARBALL}" | sha256sum -c -

  tag:
    name: Tag validated commit
    needs: [prepare, ci, nodejs-build, build-os-image, build-cli, validate-managed-qemu]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - name: Create tag if needed
        env:
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch origin --tags
          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            tagged_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [[ "$tagged_sha" != "$RELEASE_SHA" ]]; then
              echo "${RELEASE_TAG} already points to ${tagged_sha}, not ${RELEASE_SHA}" >&2
              exit 1
            fi
            echo "${RELEASE_TAG} already exists on the validated commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" "$RELEASE_SHA" -m "Release ${RELEASE_TAG}"
            git push origin "$RELEASE_TAG"
          fi

  stage-github-release:
    name: Stage draft GitHub release
    needs: [prepare, tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: os-image-*
          merge-multiple: true
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-binary-*
          merge-multiple: true
          path: artifacts/
      - name: Inspect existing release
        id: release-state
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null)"; then
            echo "stage=${is_draft}" >> "$GITHUB_OUTPUT"
          else
            echo "stage=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create or update draft release
        if: steps.release-state.outputs.stage == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/*

  publish-crates:
    name: Optionally publish crates.io packages
    needs: [prepare, stage-github-release]
    if: needs.prepare.outputs.publish-crates == 'true'
    uses: ./.github/workflows/publish-crates.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  publish-nodejs:
    name: Publish npm packages
    needs: [prepare, stage-github-release, publish-crates]
    if: ${{ always() && needs.prepare.result == 'success' && needs.stage-github-release.result == 'success' && (needs.publish-crates.result == 'success' || needs.publish-crates.result == 'skipped') }}
    uses: ./.github/workflows/release_nodejs.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}
      version: ${{ needs.prepare.outputs.version }}
    permissions:
      contents: read
      id-token: write
    secrets: inherit

  finalize-github-release:
    name: Publish GitHub release
    needs: [prepare, publish-nodejs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if [[ "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" == "true" ]]; then
            gh release edit "$RELEASE_TAG" --draft=false --latest
          else
            echo "${RELEASE_TAG} is already public"
          fi
