name: Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "patch, minor, major, or an exact SemVer version without build metadata"
        required: true
        type: string
        default: patch
      service_evidence:
        description: Windows evidence policy for the signed service artifact
        required: true
        type: choice
        default: skip
        options:
          - skip
          - required

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  LSB_FORCE_DOCKER_ROOTFS: "1"

jobs:
  prepare:
    name: Prepare release commit
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
    outputs:
      publish-crates: ${{ steps.crates-config.outputs.enabled }}
      is-prerelease: ${{ steps.release.outputs.is-prerelease }}
      npm-tag: ${{ steps.release.outputs.npm-tag }}
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Detect optional crates.io publishing
        id: crates-config
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -n "$CARGO_REGISTRY_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare or resume release
        id: release
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          git fetch origin main --tags
          base_sha="$(git rev-parse HEAD)"
          remote_sha="$(git rev-parse origin/main)"
          if [[ "$base_sha" != "$remote_sha" ]]; then
            echo "main moved before release preparation; rerun the workflow" >&2
            exit 1
          fi

          current_version="$(cargo run -q -p xtask -- release current)"
          current_tag="v${current_version}"
          current_is_prerelease="$(cargo run -q -p xtask -- release channel | sed -n 's/^is-prerelease=//p')"
          resume=false

          if [[ "$REQUESTED_VERSION" =~ ^(patch|minor|major)$ && "$current_is_prerelease" == "true" ]]; then
            echo "${REQUESTED_VERSION} cannot be used while ${current_version} is a prerelease; provide an exact version" >&2
            exit 1
          fi

          if [[ "$REQUESTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] && git show-ref --verify --quiet "refs/tags/v${REQUESTED_VERSION}"; then
            current_version="$REQUESTED_VERSION"
            current_tag="v${current_version}"
            git checkout --detach "$current_tag"
            resume=true
          elif [[ "$REQUESTED_VERSION" == "$current_version" ]]; then
            resume=true
          elif [[ "$REQUESTED_VERSION" =~ ^(patch|minor|major)$ ]] && ! git show-ref --verify --quiet "refs/tags/${current_tag}"; then
            resume=true
          fi

          if [[ "$resume" == false ]]; then
            cargo run -p xtask -- release prepare "$REQUESTED_VERSION"
            current_version="$(cargo run -q -p xtask -- release current)"
            current_tag="v${current_version}"
          fi

          cargo run -p xtask -- release verify --version "$current_version"
          cargo metadata --locked --format-version 1 --no-deps >/dev/null

          unexpected="$(git diff --name-only | grep -Ev '^(Cargo\.toml|Cargo\.lock|bindings/nodejs/Cargo\.toml|bindings/nodejs/package\.json|bindings/nodejs/npm/[^/]+/package\.json)$' || true)"
          if [[ -n "$unexpected" ]]; then
            echo "release preparation changed files outside the allowlist:" >&2
            echo "$unexpected" >&2
            exit 1
          fi

          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock bindings/nodejs/Cargo.toml bindings/nodejs/package.json bindings/nodejs/npm/*/package.json
            git commit -m "chore(release): prepare ${current_tag}"

            git fetch origin main
            if [[ "$(git rev-parse origin/main)" != "$base_sha" ]]; then
              echo "main moved during release preparation; rerun the workflow" >&2
              exit 1
            fi
            git push origin HEAD:main
          fi

          release_sha="$(git rev-parse HEAD)"
          if git show-ref --verify --quiet "refs/tags/${current_tag}"; then
            tagged_sha="$(git rev-list -n 1 "$current_tag")"
            if [[ "$tagged_sha" != "$release_sha" ]]; then
              echo "${current_tag} already points to ${tagged_sha}, not ${release_sha}" >&2
              exit 1
            fi
          fi

          {
            echo "sha=${release_sha}"
            echo "tag=${current_tag}"
            echo "version=${current_version}"
            cargo run -q -p xtask -- release channel
          } >> "$GITHUB_OUTPUT"

  publisher-config:
    name: Validate service publisher policy
    needs: prepare
    runs-on: ubuntu-24.04
    outputs:
      current: ${{ steps.policy.outputs.current }}
      previous: ${{ steps.policy.outputs.previous }}
    steps:
      - name: Validate and normalize publisher thumbprints
        id: policy
        shell: bash
        env:
          CURRENT: ${{ vars.SEAWORK_PUBLISHER_SHA256 }}
          PREVIOUS: ${{ vars.SEAWORK_PUBLISHER_SHA256_PREVIOUS }}
        run: |
          set -euo pipefail
          if [[ ! "$CURRENT" =~ ^[0-9A-Fa-f]{64}$ ]]; then
            echo "SEAWORK_PUBLISHER_SHA256 must be one SHA-256 certificate thumbprint" >&2
            exit 1
          fi
          current="${CURRENT,,}"
          previous="${PREVIOUS,,}"
          if [[ -n "$previous" && ! "$previous" =~ ^[0-9a-f]{64}$ ]]; then
            echo "SEAWORK_PUBLISHER_SHA256_PREVIOUS must be one SHA-256 certificate thumbprint" >&2
            exit 1
          fi
          if [[ -n "$previous" && "$previous" == "$current" ]]; then
            echo "current and previous SeaWork publisher thumbprints must differ" >&2
            exit 1
          fi
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"

  service-config:
    name: Validate SeaWork signing configuration
    if: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
    needs: [prepare, publisher-config]
    runs-on: ubuntu-24.04
    environment: seawork-service-signing
    outputs:
      publisher-sha256: ${{ steps.config.outputs.publisher-sha256 }}
      publisher-sha256-previous: ${{ steps.config.outputs.publisher-sha256-previous }}
    steps:
      - name: Validate signing variables and secrets
        id: config
        shell: bash
        env:
          PUBLISHER_SHA256: ${{ needs.publisher-config.outputs.current }}
          PUBLISHER_SHA256_PREVIOUS: ${{ needs.publisher-config.outputs.previous }}
          PUBLISHER_SUBJECT: ${{ vars.SEAWORK_PUBLISHER_SUBJECT }}
          TIMESTAMP_URL: ${{ vars.SEAWORK_TIMESTAMP_URL }}
          CODESIGN_PFX_BASE64: ${{ secrets.SEAWORK_CODESIGN_PFX_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.SEAWORK_CODESIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$PUBLISHER_SUBJECT" ]]; then
            echo "SEAWORK_PUBLISHER_SUBJECT is required" >&2
            exit 1
          fi
          # RFC 3161 responses are signed by the timestamp authority, and some
          # authorities (including Sectigo) publish HTTP-only endpoints.
          if [[ ! "$TIMESTAMP_URL" =~ ^https?://[^[:space:]]+$ ]]; then
            echo "SEAWORK_TIMESTAMP_URL must be a non-empty HTTP(S) URL" >&2
            exit 1
          fi
          if [[ -z "$CODESIGN_PFX_BASE64" || -z "$CODESIGN_PASSWORD" ]]; then
            echo "SeaWork signing secrets are incomplete" >&2
            exit 1
          fi
          if ! printf '%s' "$CODESIGN_PFX_BASE64" | base64 --decode >/dev/null; then
            echo "SEAWORK_CODESIGN_PFX_BASE64 is not valid base64" >&2
            exit 1
          fi
          echo "publisher-sha256=$PUBLISHER_SHA256" >> "$GITHUB_OUTPUT"
          echo "publisher-sha256-previous=$PUBLISHER_SHA256_PREVIOUS" >> "$GITHUB_OUTPUT"

  release-config-ready:
    name: Release configuration ready
    if: ${{ always() }}
    needs: [prepare, publisher-config, service-config]
    runs-on: ubuntu-24.04
    steps:
      - name: Require selected configuration
        shell: bash
        env:
          PREPARE_RESULT: ${{ needs.prepare.result }}
          PUBLISHER_RESULT: ${{ needs.publisher-config.result }}
          SERVICE_CONFIG_RESULT: ${{ needs.service-config.result }}
          SERVICE_ENABLED: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
        run: |
          set -euo pipefail
          if [[ "$PREPARE_RESULT" != "success" || "$PUBLISHER_RESULT" != "success" ]]; then
            echo "release preparation or publisher policy validation failed" >&2
            exit 1
          fi
          if [[ "$SERVICE_ENABLED" == "true" && "$SERVICE_CONFIG_RESULT" != "success" ]]; then
            echo "SeaWork signing configuration validation failed" >&2
            exit 1
          fi

  ci:
    name: Rust validation
    needs: [prepare, release-config-ready]
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}

  nodejs-build:
    name: Node.js validation and build
    needs: [prepare, publisher-config, release-config-ready]
    uses: ./.github/workflows/nodejs-binding.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}
      seawork_publisher_sha256: ${{ needs.publisher-config.outputs.current }}
      seawork_publisher_sha256_previous: ${{ needs.publisher-config.outputs.previous }}
      production_release: true

  build-os-image:
    name: Build OS image (${{ matrix.platform }})
    needs: [prepare, release-config-ready]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: ubuntu-24.04-arm
            guest_linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER
            guest_linker_bin: musl-gcc
          - platform: macos-x86_64
            runner: ubuntu-24.04
            guest_linker_env: CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER
            guest_linker_bin: musl-gcc
          - platform: windows-x86_64
            runner: ubuntu-24.04
            guest_linker_env: CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER
            guest_linker_bin: musl-gcc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Resolve platform metadata
        run: cargo run -p xtask -- platform-meta --platform "${{ matrix.platform }}" --format env --version "${{ needs.prepare.outputs.tag }}" >> "$GITHUB_ENV"

      - run: rustup target add "${LSB_GUEST_TARGET}"

      - name: Install rootfs build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools build-essential bc flex bison \
            libelf-dev libssl-dev wget xz-utils

      - name: Build guest
        run: env "${{ matrix.guest_linker_env }}=${{ matrix.guest_linker_bin }}" cargo build -p lsb-guest --target "${LSB_GUEST_TARGET}" --release --locked

      - name: Build OS image
        run: cargo run -p xtask -- prepare-rootfs --platform "${{ matrix.platform }}"

      - name: Package OS image
        run: cargo run -p xtask -- package-release --platform "${{ matrix.platform }}" --artifact os-image --version "${{ needs.prepare.outputs.tag }}"

      - uses: actions/upload-artifact@v4
        with:
          name: os-image-${{ matrix.platform }}
          path: lsb-os-*.tar.gz
          retention-days: 7

  build-cli:
    name: Build CLI (${{ matrix.platform }})
    needs: [prepare, release-config-ready]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: macos-14
            rust_target: aarch64-apple-darwin
          - platform: macos-x86_64
            runner: macos-14
            rust_target: x86_64-apple-darwin
          - platform: windows-x86_64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Resolve platform metadata
        run: cargo run -p xtask -- platform-meta --platform "${{ matrix.platform }}" --format env --version "${{ needs.prepare.outputs.tag }}" >> "$GITHUB_ENV"

      - name: Build CLI
        run: cargo build -p lsb-cli --release --locked --target "${LSB_HOST_TARGET}"

      - name: Codesign
        if: ${{ startsWith(matrix.platform, 'macos-') }}
        run: codesign --entitlements "${LSB_CODESIGN_ENTITLEMENTS}" --force -s - "target/${LSB_HOST_TARGET}/release/${LSB_CLI_BINARY}"

      - name: Stage CLI artifact
        run: |
          mkdir -p target/release
          cp "target/${LSB_HOST_TARGET}/release/${LSB_CLI_BINARY}" "target/release/${LSB_CLI_BINARY}"

      - name: Package CLI
        run: cargo run -p xtask -- package-release --platform "${{ matrix.platform }}" --artifact cli --version "${{ needs.prepare.outputs.tag }}"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-binary-${{ matrix.platform }}
          path: lsb-*.tar.gz
          retention-days: 7

  validate-managed-qemu:
    name: Validate managed Windows QEMU artifact
    needs: [prepare, release-config-ready]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve managed QEMU metadata
        run: cargo run -p xtask -- platform-meta --platform windows-x86_64 --format env >> "$GITHUB_ENV"
      - name: Verify managed QEMU artifact
        run: |
          curl -fsSL "${LSB_MANAGED_QEMU_URL}" -o "${LSB_MANAGED_QEMU_TARBALL}"
          echo "${LSB_MANAGED_QEMU_SHA256}  ${LSB_MANAGED_QEMU_TARBALL}" | sha256sum -c -

  build-seawork-service:
    name: Build and sign SeaWork Windows artifacts
    if: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
    needs: [prepare, build-os-image, service-config]
    runs-on: windows-latest
    timeout-minutes: 120
    environment: seawork-service-signing
    permissions:
      contents: read
      id-token: write
      attestations: write
    defaults:
      run:
        shell: pwsh
    env:
      SEAWORK_PUBLISHER_SUBJECT: ${{ vars.SEAWORK_PUBLISHER_SUBJECT }}
      SEAWORK_PUBLISHER_SHA256: ${{ needs.service-config.outputs.publisher-sha256 }}
      SEAWORK_PUBLISHER_SHA256_PREVIOUS: ${{ needs.service-config.outputs.publisher-sha256-previous }}
      SEAWORK_TIMESTAMP_URL: ${{ vars.SEAWORK_TIMESTAMP_URL }}
      SEAWORK_CODESIGN_PFX_BASE64: ${{ secrets.SEAWORK_CODESIGN_PFX_BASE64 }}
      SEAWORK_CODESIGN_PASSWORD: ${{ secrets.SEAWORK_CODESIGN_PASSWORD }}
      LSB_SEAWORK_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - name: Resolve release metadata
        run: |
          cargo run -p xtask --locked -- platform-meta `
            --platform windows-x86_64 --format env --version "v$env:LSB_SEAWORK_VERSION" |
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Resolve Windows SDK event-message tools
        run: |
          $roots = Get-ItemProperty -LiteralPath 'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots'
          if ([string]::IsNullOrWhiteSpace($roots.KitsRoot10)) {
            throw 'Windows SDK KitsRoot10 is unavailable'
          }
          $toolset = Get-ChildItem -LiteralPath (Join-Path $roots.KitsRoot10 'bin') -Directory |
            Sort-Object Name -Descending |
            Where-Object {
              (Test-Path -LiteralPath (Join-Path $_.FullName 'x64\mc.exe') -PathType Leaf) -and
              (Test-Path -LiteralPath (Join-Path $_.FullName 'x64\rc.exe') -PathType Leaf)
            } |
            Select-Object -First 1
          if ($null -eq $toolset) { throw 'no complete x64 Windows SDK mc.exe/rc.exe toolset was found' }
          "LSB_COMPILE_EVENT_MESSAGES=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LSB_WINDOWS_MC_PATH=$($toolset.FullName)\x64\mc.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LSB_WINDOWS_RC_PATH=$($toolset.FullName)\x64\rc.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build service, updater, and symbols
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: |
          cargo build -p lsb-seawork-service -p lsb-seawork-updater `
            --locked --release --target x86_64-pc-windows-msvc

      - name: Verify embedded Event Log messages
        run: |
          .\scripts\verify-seawork-event-messages.ps1 `
            -ServiceBinary '.\target\x86_64-pc-windows-msvc\release\localsandbox-seawork-service.exe' `
            -OutputPath '.\target\seawork-service\event-messages-unsigned.json'

      - uses: actions/download-artifact@v4
        with:
          name: os-image-windows-x86_64
          path: target/seawork-service/os-image

      - name: Prepare signed bundle inputs
        run: |
          $root = Join-Path $PWD 'target\seawork-service'
          $input = Join-Path $root 'input'
          $runtime = Join-Path $input 'runtime'
          $qemuExtract = Join-Path $input 'qemu-extract'
          New-Item -ItemType Directory -Path $runtime, $qemuExtract, (Join-Path $root 'out') | Out-Null

          $osArchive = @(Get-ChildItem -LiteralPath (Join-Path $root 'os-image') -File -Filter 'lsb-os-*.tar.gz')
          if ($osArchive.Count -ne 1) { throw 'expected exactly one Windows OS image archive' }
          tar -xzf $osArchive[0].FullName -C $runtime
          if ($LASTEXITCODE -ne 0) { throw 'extracting the OS image archive failed' }

          $qemuArchive = Join-Path $input $env:LSB_MANAGED_QEMU_TARBALL
          Invoke-WebRequest -Uri $env:LSB_MANAGED_QEMU_URL -OutFile $qemuArchive
          $actualQemuHash = (Get-FileHash -LiteralPath $qemuArchive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualQemuHash -cne $env:LSB_MANAGED_QEMU_SHA256) {
            throw 'managed QEMU archive hash mismatch'
          }
          tar -xzf $qemuArchive -C $qemuExtract
          if ($LASTEXITCODE -ne 0) { throw 'extracting the managed QEMU archive failed' }

          $secrets = Join-Path $env:RUNNER_TEMP 'seawork-signing'
          New-Item -ItemType Directory -Path $secrets | Out-Null
          [IO.File]::WriteAllBytes(
            (Join-Path $secrets 'codesign.pfx'),
            [Convert]::FromBase64String($env:SEAWORK_CODESIGN_PFX_BASE64)
          )
          [IO.File]::WriteAllText(
            (Join-Path $secrets 'password.txt'),
            $env:SEAWORK_CODESIGN_PASSWORD,
            [Text.UTF8Encoding]::new($false)
          )
          "LSB_SEAWORK_INPUT=$input" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LSB_SEAWORK_QEMU=$qemuExtract\$env:LSB_MANAGED_QEMU_TOP_LEVEL_DIR" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LSB_SEAWORK_PFX=$secrets\codesign.pfx" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "LSB_SEAWORK_PASSWORD=$secrets\password.txt" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Sign service and updater PEs
        run: |
          # TODO: Remove SkipTrustVerification after provisioning the company root CA on hosted runners.
          .\scripts\sign-seawork-service.ps1 `
            -Mode SignPe `
            -ServiceBinary '.\target\x86_64-pc-windows-msvc\release\localsandbox-seawork-service.exe' `
            -PfxPath $env:LSB_SEAWORK_PFX `
            -PasswordFile $env:LSB_SEAWORK_PASSWORD `
            -TimestampUrl $env:SEAWORK_TIMESTAMP_URL `
            -ExpectedPublisherSubject $env:SEAWORK_PUBLISHER_SUBJECT `
            -ExpectedPublisherSha256 $env:SEAWORK_PUBLISHER_SHA256 `
            -SkipTrustVerification
          .\scripts\sign-seawork-service.ps1 `
            -Mode SignUpdaterPe `
            -UpdaterBinary '.\target\x86_64-pc-windows-msvc\release\localsandbox-seawork-updater.exe' `
            -PfxPath $env:LSB_SEAWORK_PFX `
            -PasswordFile $env:LSB_SEAWORK_PASSWORD `
            -TimestampUrl $env:SEAWORK_TIMESTAMP_URL `
            -ExpectedPublisherSubject $env:SEAWORK_PUBLISHER_SUBJECT `
            -ExpectedPublisherSha256 $env:SEAWORK_PUBLISHER_SHA256 `
            -SkipTrustVerification

      - name: Verify signed updater identity
        run: |
          $updater = '.\target\x86_64-pc-windows-msvc\release\localsandbox-seawork-updater.exe'
          .\scripts\sign-seawork-service.ps1 `
            -Mode VerifyUpdaterPe `
            -UpdaterBinary $updater `
            -ExpectedPublisherSubject $env:SEAWORK_PUBLISHER_SUBJECT `
            -ExpectedPublisherSha256 $env:SEAWORK_PUBLISHER_SHA256 `
            -SkipTrustVerification | Out-Null
          $identityText = (& $updater --version --json | Out-String).Trim()
          if ($LASTEXITCODE -ne 0) { throw 'signed updater version query failed' }
          $identity = $identityText | ConvertFrom-Json
          if ($identity.service_name -cne 'LocalSandboxSeaWorkUpdater' -or
              [string]$identity.helper_version -cne $env:LSB_SEAWORK_VERSION -or
              [int]$identity.helper_protocol_major -ne 1 -or
              [int]$identity.helper_protocol_minor -ne 1) {
            throw 'signed updater identity or helper protocol is invalid'
          }

      - name: Verify signed PE Event Log messages
        run: |
          .\scripts\verify-seawork-event-messages.ps1 `
            -ServiceBinary '.\target\x86_64-pc-windows-msvc\release\localsandbox-seawork-service.exe' `
            -OutputPath '.\target\seawork-service\event-messages-signed.json'

      - name: Generate SBOM and license inventory
        run: |
          .\scripts\inspect-seawork-service-dependencies.ps1 `
            -ServiceBinary '.\target\x86_64-pc-windows-msvc\release\localsandbox-seawork-service.exe' `
            -OutputPath (Join-Path $env:LSB_SEAWORK_INPUT 'runtime-dependencies.json')
          $metadataPath = Join-Path $env:LSB_SEAWORK_INPUT 'cargo-metadata.json'
          $process = Start-Process cargo.exe `
            -ArgumentList @('metadata', '--locked', '--format-version', '1') `
            -RedirectStandardOutput $metadataPath `
            -NoNewWindow -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw 'cargo metadata failed' }
          $created = git show -s --format=%cI HEAD
          .\scripts\prepare-seawork-release-metadata.ps1 `
            -MetadataPath $metadataPath `
            -OutputDirectory (Join-Path $env:LSB_SEAWORK_INPUT 'metadata') `
            -Version $env:LSB_SEAWORK_VERSION `
            -CommitSha $env:RELEASE_SHA `
            -CreatedUtc $created

      - name: Stage bundle and manifests
        run: |
          cargo run -p xtask --locked -- package-release `
            --artifact seawork-service `
            --mode stage `
            --platform windows-x86_64 `
            --version $env:LSB_SEAWORK_VERSION `
            --output-dir target/seawork-service/out `
            --service-binary target/x86_64-pc-windows-msvc/release/localsandbox-seawork-service.exe `
            --runtime-dir $env:LSB_SEAWORK_INPUT\runtime `
            --qemu-dir $env:LSB_SEAWORK_QEMU `
            --sbom $env:LSB_SEAWORK_INPUT\metadata\sbom.spdx.json `
            --dependency-report $env:LSB_SEAWORK_INPUT\runtime-dependencies.json `
            --licenses $env:LSB_SEAWORK_INPUT\metadata\licenses `
            --publisher-subject $env:SEAWORK_PUBLISHER_SUBJECT `
            --publisher-thumbprint $env:SEAWORK_PUBLISHER_SHA256
          "LSB_SEAWORK_STAGE=$PWD\target\seawork-service\out\lsb-seawork-service-v$env:LSB_SEAWORK_VERSION-windows-x86_64-stage" | `
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Generate and sign catalog
        run: |
          $work = Join-Path $PWD 'target\seawork-service\catalog-work'
          New-Item -ItemType Directory -Path $work | Out-Null
          .\scripts\sign-seawork-service.ps1 `
            -Mode Catalog `
            -BundleRoot $env:LSB_SEAWORK_STAGE\LocalSandbox `
            -WorkDirectory $work `
            -PfxPath $env:LSB_SEAWORK_PFX `
            -PasswordFile $env:LSB_SEAWORK_PASSWORD `
            -TimestampUrl $env:SEAWORK_TIMESTAMP_URL `
            -ExpectedPublisherSubject $env:SEAWORK_PUBLISHER_SUBJECT `
            -ExpectedPublisherSha256 $env:SEAWORK_PUBLISHER_SHA256 `
            -SkipTrustVerification

      - name: Generate source map and final archives
        run: |
          $service = Resolve-Path '.\target\x86_64-pc-windows-msvc\release\localsandbox-seawork-service.exe'
          $pdb = Resolve-Path '.\target\x86_64-pc-windows-msvc\release\localsandbox_seawork_service.pdb'
          $sourceMap = [ordered]@{
            schema_version = 1
            version = $env:LSB_SEAWORK_VERSION
            commit = $env:RELEASE_SHA
            target = 'x86_64-pc-windows-msvc'
            service_sha256 = (Get-FileHash -LiteralPath $service -Algorithm SHA256).Hash.ToLowerInvariant()
            pdb_sha256 = (Get-FileHash -LiteralPath $pdb -Algorithm SHA256).Hash.ToLowerInvariant()
          } | ConvertTo-Json
          $sourceMapPath = Join-Path $env:LSB_SEAWORK_INPUT 'source-map.json'
          [IO.File]::WriteAllText($sourceMapPath, $sourceMap + "`n", [Text.UTF8Encoding]::new($false))
          cargo run -p xtask --locked -- package-release `
            --artifact seawork-service `
            --mode archive `
            --platform windows-x86_64 `
            --version $env:LSB_SEAWORK_VERSION `
            --output-dir target/seawork-service/out `
            --stage-dir $env:LSB_SEAWORK_STAGE `
            --catalog $env:LSB_SEAWORK_STAGE\LocalSandbox\manifests\LocalSandboxSeaWork.cat `
            --pdb $pdb `
            --source-map $sourceMapPath

      - name: Package updater release artifacts
        run: |
          cargo run -p xtask --locked -- package-release `
            --artifact seawork-updater `
            --platform windows-x86_64 `
            --version $env:LSB_SEAWORK_VERSION `
            --output-dir target/seawork-service/out `
            --updater-binary target/x86_64-pc-windows-msvc/release/localsandbox-seawork-updater.exe `
            --publisher-subject $env:SEAWORK_PUBLISHER_SUBJECT `
            --publisher-thumbprint $env:SEAWORK_PUBLISHER_SHA256

      - name: Verify final signatures and bundle
        run: |
          .\scripts\sign-seawork-service.ps1 `
            -Mode Verify `
            -BundleRoot $env:LSB_SEAWORK_STAGE\LocalSandbox `
            -ExpectedPublisherSubject $env:SEAWORK_PUBLISHER_SUBJECT `
            -ExpectedPublisherSha256 $env:SEAWORK_PUBLISHER_SHA256 `
            -SkipTrustVerification
          & "$env:LSB_SEAWORK_STAGE\LocalSandbox\bin\localsandbox-seawork-service.exe" --verify-bundle --json
          if ($LASTEXITCODE -ne 0) { throw 'service bundle verification failed' }

      - name: Attest service release assets
        uses: actions/attest@v4
        with:
          subject-path: target/seawork-service/out/lsb-seawork-service-*.zip

      - name: Attest updater release asset
        uses: actions/attest@v4
        with:
          subject-path: target/seawork-service/out/lsb-seawork-updater-v*-windows-x86_64.zip

      - name: Upload SeaWork release assets
        uses: actions/upload-artifact@v4
        with:
          name: seawork-service-release
          path: |
            target/seawork-service/out/lsb-seawork-service-*.zip
            target/seawork-service/out/lsb-seawork-service-v*-SHA256SUMS
            target/seawork-service/out/lsb-seawork-updater-v*-windows-x86_64.zip
            target/seawork-service/out/lsb-seawork-updater-v*-windows-x86_64-manifest.json
            target/seawork-service/out/lsb-seawork-updater-v*-SHA256SUMS
            target/seawork-service/event-messages-signed.json
          if-no-files-found: error
          retention-days: 14

  gate-seawork-service-windows:
    name: Gate signed service on complete Windows evidence
    if: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' && inputs.service_evidence == 'required' }}
    needs: [prepare, build-seawork-service]
    runs-on: [self-hosted, Windows, X64, seawork-service]
    timeout-minutes: 30
    environment: seawork-service-production
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    env:
      SEAWORK_WINDOWS_EVIDENCE_ROOT: ${{ vars.SEAWORK_WINDOWS_EVIDENCE_ROOT }}
      RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v4
        with:
          name: seawork-service-release
          path: target/release-candidate

      - name: Validate exact-artifact full Windows evidence
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SEAWORK_WINDOWS_EVIDENCE_ROOT) -or
              -not [IO.Path]::IsPathFullyQualified($env:SEAWORK_WINDOWS_EVIDENCE_ROOT)) {
            throw 'SEAWORK_WINDOWS_EVIDENCE_ROOT must be a protected absolute runner path'
          }
          $candidateOut = Join-Path 'target/release-candidate' 'out'
          $payload = @(Get-ChildItem -LiteralPath $candidateOut -File -Filter 'lsb-seawork-service-v*-windows-x86_64.zip')
          if ($payload.Count -ne 1) {
            throw 'expected exactly one signed SeaWork service payload archive'
          }
          $artifactSha = (Get-FileHash -LiteralPath $payload[0].FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $evidenceRoot = [IO.Path]::GetFullPath($env:SEAWORK_WINDOWS_EVIDENCE_ROOT)
          $sourceDirectory = Join-Path (Join-Path $evidenceRoot $env:RELEASE_SHA) $artifactSha
          $sourceManifest = Join-Path $sourceDirectory 'manifest.json'
          $relative = [IO.Path]::GetRelativePath($evidenceRoot, $sourceManifest)
          if ([IO.Path]::IsPathRooted($relative) -or $relative -eq '..' -or $relative.StartsWith("..$([IO.Path]::DirectorySeparatorChar)")) {
            throw 'derived Windows evidence path escaped its protected root'
          }
          if (-not (Test-Path -LiteralPath $sourceManifest -PathType Leaf)) {
            throw 'complete Windows evidence for this exact commit and artifact is unavailable'
          }

          $destinationParent = Join-Path (Join-Path 'target/release-gate-evidence' $env:RELEASE_SHA) $artifactSha
          $destinationRoot = Split-Path -Parent $destinationParent
          if (Test-Path -LiteralPath $destinationParent) {
            throw 'Windows evidence validation destination already exists'
          }
          New-Item -ItemType Directory -Path $destinationRoot -Force | Out-Null
          try {
            Copy-Item -LiteralPath $sourceDirectory -Destination $destinationRoot -Recurse -ErrorAction Stop
          } catch {
            throw 'copying protected Windows evidence into the validation workspace failed'
          }
          $manifest = Join-Path $destinationParent 'manifest.json'
          cargo run -p xtask --locked -- verify-windows-evidence `
            --manifest $manifest `
            --artifact $payload[0].FullName `
            --require-profile full `
            --require-complete
          if ($LASTEXITCODE -ne 0) {
            throw 'complete Windows evidence validation failed'
          }

      - name: Retain validated redacted Windows evidence
        uses: actions/upload-artifact@v4
        with:
          name: seawork-service-windows-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/release-gate-evidence
          if-no-files-found: error
          retention-days: 90

  service-ready:
    name: Resolve SeaWork service readiness
    if: ${{ always() }}
    needs: [prepare, build-seawork-service, gate-seawork-service-windows]
    runs-on: ubuntu-24.04
    outputs:
      evidence-status: ${{ steps.status.outputs.evidence-status }}
    steps:
      - name: Record selected service policy
        id: status
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build-seawork-service.result }}
          EVIDENCE_POLICY: ${{ inputs.service_evidence }}
          GATE_RESULT: ${{ needs.gate-seawork-service-windows.result }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          SERVICE_ENABLED: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
          VERSION: ${{ needs.prepare.outputs.version }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ "$SERVICE_ENABLED" != "true" ]]; then
            status=not-applicable
          elif [[ "$BUILD_RESULT" != "success" ]]; then
            echo "signed SeaWork service/updater construction did not succeed" >&2
            exit 1
          elif [[ "$EVIDENCE_POLICY" == "required" && "$GATE_RESULT" != "success" ]]; then
            echo "required exact-artifact Windows evidence did not validate" >&2
            exit 1
          elif [[ "$EVIDENCE_POLICY" == "required" ]]; then
            status=validated
          else
            status=skipped-by-operator
            echo "::warning title=Windows service evidence skipped::The signed service is not Windows-evidence-qualified for this release."
            {
              echo "# ⚠️ Windows service evidence skipped by operator"
              echo
              echo "The signed service and updater passed hosted build-time verification, but the service is **not Windows-evidence-qualified**."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          file="lsb-seawork-service-v${VERSION}-release-status.json"
          jq -n \
            --arg release_sha "$RELEASE_SHA" \
            --arg version "$VERSION" \
            --argjson service_enabled "$SERVICE_ENABLED" \
            --argjson workflow_run_id "$WORKFLOW_RUN_ID" \
            --argjson workflow_run_attempt "$WORKFLOW_RUN_ATTEMPT" \
            --arg evidence_policy "$EVIDENCE_POLICY" \
            --arg evidence_status "$status" \
            '{
              schema_version: 1,
              release_sha: $release_sha,
              version: $version,
              service_enabled: $service_enabled,
              workflow_run_id: $workflow_run_id,
              workflow_run_attempt: $workflow_run_attempt,
              evidence_policy: $evidence_policy,
              evidence_status: $evidence_status
            }' > "$file"
          echo "evidence-status=$status" >> "$GITHUB_OUTPUT"
          echo "status-file=$file" >> "$GITHUB_OUTPUT"

      - name: Upload service release status
        uses: actions/upload-artifact@v4
        with:
          name: seawork-service-release-status
          path: ${{ steps.status.outputs.status-file }}
          if-no-files-found: error
          retention-days: 14

  tag:
    name: Tag validated commit
    needs: [prepare, ci, nodejs-build, build-os-image, build-cli, validate-managed-qemu, service-ready]
    if: ${{ always() && needs.prepare.result == 'success' && needs.ci.result == 'success' && needs.nodejs-build.result == 'success' && needs.build-os-image.result == 'success' && needs.build-cli.result == 'success' && needs.validate-managed-qemu.result == 'success' && needs.service-ready.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - name: Create tag if needed
        env:
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch origin --tags
          if git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"; then
            tagged_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
            if [[ "$tagged_sha" != "$RELEASE_SHA" ]]; then
              echo "${RELEASE_TAG} already points to ${tagged_sha}, not ${RELEASE_SHA}" >&2
              exit 1
            fi
            echo "${RELEASE_TAG} already exists on the validated commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" "$RELEASE_SHA" -m "Release ${RELEASE_TAG}"
            git push origin "$RELEASE_TAG"
          fi

  stage-github-release:
    name: Stage draft GitHub release
    needs: [prepare, publisher-config, tag, service-ready]
    if: ${{ always() && needs.prepare.result == 'success' && needs.publisher-config.result == 'success' && needs.tag.result == 'success' && needs.service-ready.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: os-image-*
          merge-multiple: true
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-binary-*
          merge-multiple: true
          path: artifacts/
      - uses: actions/download-artifact@v4
        if: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
        with:
          name: seawork-service-release
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: seawork-service-release-status
          path: artifacts/
      - name: Normalize SeaWork artifact layout
        if: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d artifacts/out ]]; then
            shopt -s nullglob
            for source in artifacts/out/*; do
              target="artifacts/$(basename "$source")"
              if [[ -e "$target" ]]; then
                echo "SeaWork artifact layout collision: $target" >&2
                exit 1
              fi
              mv "$source" "$target"
            done
            rmdir artifacts/out
          fi
      - name: Validate SeaWork release artifact tuple
        if: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
        env:
          PUBLISHER_SHA256: ${{ needs.publisher-config.outputs.current }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          service="artifacts/lsb-seawork-service-v${VERSION}-windows-x86_64.zip"
          updater="artifacts/lsb-seawork-updater-v${VERSION}-windows-x86_64.zip"
          manifest="artifacts/lsb-seawork-updater-v${VERSION}-windows-x86_64-manifest.json"
          sums="artifacts/lsb-seawork-updater-v${VERSION}-SHA256SUMS"
          for path in "$service" "$updater" "$manifest" "$sums"; do
            if [[ ! -f "$path" ]]; then
              echo "required SeaWork release artifact is missing: $path" >&2
              exit 1
            fi
          done

          shopt -s nullglob
          service_payloads=(artifacts/lsb-seawork-service-v*-windows-x86_64.zip)
          updater_payloads=(artifacts/lsb-seawork-updater-v*-windows-x86_64.zip)
          updater_manifests=(artifacts/lsb-seawork-updater-v*-windows-x86_64-manifest.json)
          updater_sums=(artifacts/lsb-seawork-updater-v*-SHA256SUMS)
          if (( ${#service_payloads[@]} != 1 || ${#updater_payloads[@]} != 1 ||
                ${#updater_manifests[@]} != 1 || ${#updater_sums[@]} != 1 )); then
            echo "expected exactly one version-consistent service/updater release tuple" >&2
            exit 1
          fi

          (
            cd artifacts
            sha256sum -c "lsb-seawork-updater-v${VERSION}-SHA256SUMS"
          )
          jq -e \
            --arg version "$VERSION" \
            --arg publisher "$PUBLISHER_SHA256" \
            '.schema_version == 2 and
             .version == $version and
             .target == "x86_64-pc-windows-msvc" and
             .binary_name == "localsandbox-seawork-updater.exe" and
             .publisher_sha256_thumbprint == $publisher and
             .protocol.major == 1 and .protocol.min == 1 and .protocol.max == 1 and
             .service_name == "LocalSandboxSeaWorkUpdater"' \
            "$manifest" >/dev/null

          mapfile -t entries < <(unzip -Z1 "$updater" | LC_ALL=C sort)
          if (( ${#entries[@]} != 2 )) ||
             [[ "${entries[0]}" != "localsandbox-seawork-updater.exe" ]] ||
             [[ "${entries[1]}" != "manifests/updater.json" ]]; then
            echo "updater archive does not have the required closed two-file layout" >&2
            exit 1
          fi
          unzip -p "$updater" manifests/updater.json | cmp - "$manifest"
          binary_sha256="$(unzip -p "$updater" localsandbox-seawork-updater.exe | sha256sum | awk '{print $1}')"
          manifest_binary_sha256="$(jq -r '.binary_sha256' "$manifest")"
          if [[ "$binary_sha256" != "$manifest_binary_sha256" ]]; then
            echo "updater archive binary digest differs from its manifest" >&2
            exit 1
          fi
      - name: Create or update draft release
        env:
          EVIDENCE_STATUS: ${{ needs.service-ready.outputs.evidence-status }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is-prerelease }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          SERVICE_ENABLED: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
        run: |
          set -euo pipefail
          if [[ "$SERVICE_ENABLED" == "true" ]]; then
            service_line="Windows service: included"
            updater_line="Windows updater helper: included"
          else
            service_line="Windows service: not included"
            updater_line="Windows updater helper: not included"
          fi
          case "$EVIDENCE_STATUS" in
            validated) evidence_line="Windows service evidence: validated for the exact payload" ;;
            skipped-by-operator) evidence_line="Windows service evidence: skipped by operator (not Windows-evidence-qualified)" ;;
            not-applicable) evidence_line="Windows service evidence: not applicable" ;;
            *) echo "unexpected service evidence status: $EVIDENCE_STATUS" >&2; exit 1 ;;
          esac
          section="$(printf '<!-- seawork-status:start -->\n%s\n%s\n%s\n<!-- seawork-status:end -->' \
            "$service_line" "$updater_line" "$evidence_line")"

          if is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null)"; then
            if [[ "$is_draft" == "true" ]]; then
              gh release view "$RELEASE_TAG" --json body --jq .body |
                awk '
                  /^<!-- seawork-status:start -->$/ { skip=1; next }
                  /^<!-- seawork-status:end -->$/ { skip=0; next }
                  !skip { print }
                ' > release-body.md
              printf '\n%s\n' "$section" >> release-body.md
              gh release edit "$RELEASE_TAG" \
                --prerelease="$IS_PRERELEASE" \
                --notes-file release-body.md
              gh release upload "$RELEASE_TAG" artifacts/* --clobber
            else
              echo "${RELEASE_TAG} is already public"
            fi
          else
            args=(--target "$RELEASE_SHA" --draft --generate-notes --notes "$section")
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              args+=(--prerelease)
            fi
            gh release create "$RELEASE_TAG" artifacts/* "${args[@]}"
          fi

      - name: Validate staged GitHub release tuple
        if: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is-prerelease }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          release_id="$(gh release view "$RELEASE_TAG" --json databaseId --jq .databaseId)"
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" > release.json
          jq -e \
            --arg tag "$RELEASE_TAG" \
            --argjson prerelease "$IS_PRERELEASE" \
            --arg service "lsb-seawork-service-v${VERSION}-windows-x86_64.zip" \
            --arg updater "lsb-seawork-updater-v${VERSION}-windows-x86_64.zip" \
            --arg manifest "lsb-seawork-updater-v${VERSION}-windows-x86_64-manifest.json" \
            --arg sums "lsb-seawork-updater-v${VERSION}-SHA256SUMS" \
            'def valid_asset($name):
               [.assets[] | select(.name == $name and .state == "uploaded" and
                 (.size > 0) and (.digest | test("^sha256:[0-9a-f]{64}$")))] | length == 1;
             .tag_name == $tag and
             .prerelease == $prerelease and
             ((.draft == true) or (.immutable == true)) and
             valid_asset($service) and valid_asset($updater) and
             valid_asset($manifest) and valid_asset($sums)' \
            release.json >/dev/null

  publish-crates:
    name: Optionally publish crates.io packages
    needs: [prepare, stage-github-release]
    if: needs.prepare.outputs.publish-crates == 'true'
    uses: ./.github/workflows/publish-crates.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  publish-nodejs:
    name: Publish npm packages
    needs: [prepare, stage-github-release, publish-crates]
    if: ${{ always() && needs.prepare.result == 'success' && needs.stage-github-release.result == 'success' && (needs.publish-crates.result == 'success' || needs.publish-crates.result == 'skipped') }}
    uses: ./.github/workflows/release_nodejs.yml
    with:
      ref: ${{ needs.prepare.outputs.sha }}
      version: ${{ needs.prepare.outputs.version }}
      npm-tag: ${{ needs.prepare.outputs.npm-tag }}
    permissions:
      actions: read
      contents: read
      id-token: write
    secrets: inherit

  finalize-github-release:
    name: Publish GitHub release
    needs: [prepare, publish-nodejs]
    if: ${{ always() && needs.prepare.result == 'success' && needs.publish-nodejs.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Publish draft release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is-prerelease }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          SERVICE_ENABLED: ${{ vars.SEAWORK_SERVICE_SIGNING_ENABLED == 'true' }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" == "true" ]]; then
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              gh release edit "$RELEASE_TAG" --draft=false --prerelease --latest=false
            else
              gh release edit "$RELEASE_TAG" --draft=false --prerelease=false --latest
            fi
          else
            echo "${RELEASE_TAG} is already public"
          fi

          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" > release.json
          jq -e \
            --arg tag "$RELEASE_TAG" \
            --argjson prerelease "$IS_PRERELEASE" \
            --argjson service_enabled "$SERVICE_ENABLED" \
            --arg service "lsb-seawork-service-v${VERSION}-windows-x86_64.zip" \
            --arg updater "lsb-seawork-updater-v${VERSION}-windows-x86_64.zip" \
            --arg manifest "lsb-seawork-updater-v${VERSION}-windows-x86_64-manifest.json" \
            --arg sums "lsb-seawork-updater-v${VERSION}-SHA256SUMS" \
            'def valid_asset($name):
               [.assets[] | select(.name == $name and .state == "uploaded" and
                 (.size > 0) and (.digest | test("^sha256:[0-9a-f]{64}$")))] | length == 1;
             .tag_name == $tag and .draft == false and .immutable == true and
             .prerelease == $prerelease and
             (($service_enabled | not) or
               (valid_asset($service) and valid_asset($updater) and
                valid_asset($manifest) and valid_asset($sums)))' \
            release.json >/dev/null
