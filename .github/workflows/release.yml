name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-os-image:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve platform metadata
        run: cargo run -p xtask -- platform-meta --platform macos-aarch64 --format env --version "${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Add guest target
        run: rustup target add "${SHURU_GUEST_TARGET}"

      - name: Install musl toolchain and kernel build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools build-essential bc flex bison \
            libelf-dev libssl-dev wget xz-utils

      - name: Build shuru-guest
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build -p shuru-guest --target "${SHURU_GUEST_TARGET}" --release

      - name: Build OS image
        run: cargo run -p xtask -- prepare-rootfs --platform macos-aarch64

      - name: Package OS image
        run: cargo run -p xtask -- package-release --artifact os-image --version "${GITHUB_REF_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-image
          path: shuru-os-*.tar.gz
          retention-days: 1

  build-cli:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve platform metadata
        run: cargo run -p xtask -- platform-meta --platform macos-aarch64 --format env --version "${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Build CLI
        run: cargo build -p shuru-cli --release

      - name: Codesign
        run: codesign --entitlements "${SHURU_CODESIGN_ENTITLEMENTS}" --force -s - target/release/shuru

      - name: Package CLI binary
        run: cargo run -p xtask -- package-release --artifact cli --version "${GITHUB_REF_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-binary
          path: shuru-*.tar.gz
          retention-days: 1

  release:
    needs: [build-os-image, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: os-image
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: cli-binary
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  update-homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          repository: superhq-ai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-binary
          path: /tmp/artifact

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL=$(find /tmp/artifact -maxdepth 1 -name 'shuru-*.tar.gz' | head -n1)
          SHA256=$(sha256sum "${TARBALL}" | awk '{print $1}')
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/shuru.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Formula/shuru.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/shuru.rb
          git diff --cached --quiet && exit 0
          git commit -m "bump shuru to ${GITHUB_REF_NAME}"
          git push
