name: CI

on:
  workflow_call:
    inputs:
      ref:
        description: "Commit to validate"
        required: false
        type: string
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  rust-format:
    name: Rust format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all -- --check
      - run: cargo run -p xtask -- release verify

  rust-check:
    name: macOS Rust check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cmake --version
      - run: cargo check -p lsb-platform -p lsb-vm -p lsb-sdk -p lsb-cli -p xtask
      - run: cargo check -p lsb-platform -p lsb-vm -p lsb-sdk -p lsb-cli -p xtask --target x86_64-apple-darwin

  windows-hosted-rust:
    name: Hosted Windows Rust check/unit/golden
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: pwsh
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Show toolchain
        run: |
          rustc --version
          cargo --version
          rustup show
          cmake --version
      - name: Validate Windows diagnostic collector
        run: .\scripts\collect-windows-diagnostics.ps1 -StageRoot "$env:RUNNER_TEMP\windows-diagnostics-probe" -AssetWorkRoot "$env:RUNNER_TEMP\missing-lsb-assets" -SkipCargoLogs
      - name: Validate Windows release scripts
        run: |
          $failed = $false
          foreach ($path in @(
            '.\scripts\sign-seawork-service.ps1',
            '.\scripts\prepare-seawork-release-metadata.ps1',
            '.\scripts\inspect-seawork-service-dependencies.ps1',
            '.\scripts\verify-seawork-event-messages.ps1',
            '.\scripts\assemble-windows-evidence.ps1'
          )) {
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$null,
              [ref]$errors
            )
            if ($errors.Count -ne 0) {
              $failed = $true
              $errors | ForEach-Object { Write-Error "$path`: $($_.ToString())" }
            }
          }
          if ($failed) { throw 'Windows release script parsing failed' }
      - name: Cargo check Windows target
        run: cargo check --workspace --locked --target x86_64-pc-windows-msvc
      - name: QEMU argv golden tests
        run: cargo test -p lsb-platform --locked windows_x86_64::qemu::argv
      - name: QEMU preflight unit tests
        run: cargo test -p lsb-platform --locked preflight
      - name: Managed QEMU unit tests
        run: |
          cargo test -p lsb-platform --locked managed_qemu
          cargo test -p lsb-sdk --locked host_tools
          cargo test -p lsb-store --locked qemu_img_discovery
      - name: Cargo unit tests
        run: cargo test --workspace --locked
      - name: Strict SeaWork release lint
        run: cargo clippy -p xtask -p lsb-service-proto -p lsb-service-client -p lsb-seawork-update -p lsb-seawork-service -p lsb-seawork-updater --locked --no-deps -- -D warnings
      - name: Generate service SBOM and license inventory
        run: |
          $root = Join-Path $env:RUNNER_TEMP 'seawork-release-metadata'
          New-Item -ItemType Directory -Path $root | Out-Null
          $metadataPath = Join-Path $root 'cargo-metadata.json'
          $process = Start-Process cargo.exe `
            -ArgumentList @('metadata', '--locked', '--format-version', '1') `
            -RedirectStandardOutput $metadataPath `
            -NoNewWindow -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw 'cargo metadata failed' }
          $metadata = Get-Content -LiteralPath $metadataPath -Raw | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq 'lsb-seawork-service').version
          $created = git show -s --format=%cI HEAD
          .\scripts\prepare-seawork-release-metadata.ps1 `
            -MetadataPath $metadataPath `
            -OutputDirectory (Join-Path $root 'output') `
            -Version $version `
            -CommitSha $env:GITHUB_SHA `
            -CreatedUtc $created
      - name: Stage Windows hosted diagnostics
        if: failure()
        run: .\scripts\collect-windows-diagnostics.ps1 -AssetWorkRoot "$env:RUNNER_TEMP\missing-lsb-assets"
      - name: Upload Windows hosted diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-hosted-rust-diagnostics
          path: target/windows-lsb-diagnostics/**
          if-no-files-found: ignore
