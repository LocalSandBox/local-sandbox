name: Publish Node.js Binding

on:
  workflow_call:
    inputs:
      ref:
        description: "Validated release commit"
        required: true
        type: string
      version:
        description: "Release version without the v prefix"
        required: true
        type: string
      npm-tag:
        description: "npm distribution tag (next for prereleases, latest for stable releases)"
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      ref:
        description: "Validated release commit"
        required: true
        type: string
      version:
        description: "Release version without the v prefix"
        required: true
        type: string
      npm-tag:
        description: "npm distribution tag"
        required: true
        type: choice
        options:
          - next
          - latest
      source_run_id:
        description: "Workflow run containing the validated native artifacts"
        required: true
        type: string

env:
  COREPACK_INTEGRITY_KEYS: 0

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/nodejs
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: corepack enable
      - run: yarn install --immutable

      - name: Download native artifacts
        if: inputs.source_run_id == ''
        uses: actions/download-artifact@v7
        with:
          pattern: bindings-nodejs-*
          path: bindings/nodejs/artifacts

      - name: Download native artifacts from source run
        if: inputs.source_run_id != ''
        uses: actions/download-artifact@v7
        with:
          pattern: bindings-nodejs-*
          path: bindings/nodejs/artifacts
          github-token: ${{ github.token }}
          run-id: ${{ inputs.source_run_id }}

      - name: Move native artifacts
        run: yarn artifacts

      - name: Restore generated entrypoint
        shell: bash
        run: |
          entrypoint_js="$(find artifacts -type f -name index.js -print -quit)"
          if [[ -z "$entrypoint_js" ]]; then
            echo "index.js was not found in downloaded build artifacts" >&2
            exit 1
          fi

          entrypoint_dir="$(dirname "$entrypoint_js")"
          cp "$entrypoint_dir/index.js" ./index.js
          cp "$entrypoint_dir/index.d.ts" ./index.d.ts

      - name: Verify release versions and npm tag
        shell: bash
        env:
          NPM_TAG: ${{ inputs.npm-tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').version")"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"

          if [[ "$package_version" != "$RELEASE_VERSION" ]]; then
            echo "package version ($package_version) does not match release version ($RELEASE_VERSION)" >&2
            exit 1
          fi
          if [[ "$cargo_version" != "$package_version" ]]; then
            echo "Cargo version ($cargo_version) does not match package version ($package_version)" >&2
            exit 1
          fi
          if [[ "$RELEASE_VERSION" == *-* && "$NPM_TAG" != "next" ]]; then
            echo "prerelease versions must publish with npm tag next" >&2
            exit 1
          fi
          if [[ "$RELEASE_VERSION" != *-* && "$NPM_TAG" != "latest" ]]; then
            echo "stable versions must publish with npm tag latest" >&2
            exit 1
          fi

      - name: Prepare npm packages
        run: yarn napi prepublish -t npm --no-gh-release --skip-optional-publish

      - name: Publish native packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ inputs.npm-tag }}
        run: |
          set -euo pipefail
          for package_dir in npm/*; do
            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            package_version="$(node -p "require('./${package_dir}/package.json').version")"
            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "${package_name}@${package_version} is already published"
            else
              npm publish "./$package_dir" --access public --provenance --ignore-scripts --tag "$NPM_TAG"
            fi
          done

      - name: Check whether release is already published
        id: npm-state
        shell: bash
        run: |
          if npm view "@local-sandbox/lsb-nodejs@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish main package
        if: steps.npm-state.outputs.publish == 'true'
        run: npm publish --access public --provenance --ignore-scripts --tag "${{ inputs.npm-tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Report existing release
        if: steps.npm-state.outputs.publish == 'false'
        run: echo "@local-sandbox/lsb-nodejs@${{ inputs.version }} is already published"
