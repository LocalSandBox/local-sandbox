name: Node.js Binding

on:
  workflow_call:
    inputs:
      ref:
        description: "Commit to validate and build"
        required: false
        type: string
      seawork_publisher_sha256:
        description: "Current production SeaWork signing certificate SHA-256 thumbprint"
        required: false
        type: string
      seawork_publisher_sha256_previous:
        description: "Optional previous production SeaWork signing certificate SHA-256 thumbprint"
        required: false
        type: string
      production_release:
        description: "Require explicitly supplied production publisher policy"
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - ".github/workflows/nodejs-binding.yml"
      - ".github/workflows/release_nodejs.yml"
      - "bindings/nodejs/**"
      - "crates/lsb-sdk/**"
      - "crates/lsb-vm/**"
      - "crates/lsb-proto/**"
      - "crates/lsb-proxy/**"
      - "crates/lsb-platform/**"
      - "crates/lsb-store/**"
      - "crates/lsb-service-client/**"
      - "crates/lsb-service-proto/**"
  pull_request:
    paths:
      - ".github/workflows/nodejs-binding.yml"
      - ".github/workflows/release_nodejs.yml"
      - "bindings/nodejs/**"
      - "crates/lsb-sdk/**"
      - "crates/lsb-vm/**"
      - "crates/lsb-proto/**"
      - "crates/lsb-proxy/**"
      - "crates/lsb-platform/**"
      - "crates/lsb-store/**"
      - "crates/lsb-service-client/**"
      - "crates/lsb-service-proto/**"

env:
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  COREPACK_INTEGRITY_KEYS: 0
  SEAWORK_NONPRODUCTION_TEST_PUBLISHER_SHA256: "1111111111111111111111111111111111111111111111111111111111111111"

jobs:
  lint:
    name: Lint and Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/nodejs
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
      - run: cmake --version
      - run: yarn install --immutable
      - run: yarn lint
      - run: cargo fmt --manifest-path Cargo.toml -- --check
      - run: cargo check --manifest-path Cargo.toml

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    env:
      SEAWORK_PUBLISHER_SHA256: ${{ inputs.seawork_publisher_sha256 || vars.SEAWORK_PUBLISHER_SHA256 }}
      SEAWORK_PUBLISHER_SHA256_PREVIOUS: ${{ inputs.seawork_publisher_sha256_previous || vars.SEAWORK_PUBLISHER_SHA256_PREVIOUS }}
    defaults:
      run:
        working-directory: bindings/nodejs
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cmake --version
      - run: yarn install --immutable
      - name: Validate Windows service publisher policy
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        env:
          CONFIGURED_PUBLISHER_SHA256: ${{ inputs.seawork_publisher_sha256 }}
          PRODUCTION_RELEASE: ${{ inputs.production_release }}
        run: |
          if ($env:PRODUCTION_RELEASE -eq 'true' -and
              [string]::IsNullOrWhiteSpace($env:CONFIGURED_PUBLISHER_SHA256)) {
            throw 'production Node builds require an explicitly supplied SeaWork publisher thumbprint'
          }
          $publisher = $env:SEAWORK_PUBLISHER_SHA256
          if ([string]::IsNullOrWhiteSpace($publisher)) {
            $publisher = $env:SEAWORK_NONPRODUCTION_TEST_PUBLISHER_SHA256
            "SEAWORK_PUBLISHER_SHA256=$publisher" |
              Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if ($publisher -notmatch '^[0-9A-Fa-f]{64}$') {
            throw 'SEAWORK_PUBLISHER_SHA256 must be one SHA-256 certificate thumbprint'
          }
          $previous = $env:SEAWORK_PUBLISHER_SHA256_PREVIOUS
          if (-not [string]::IsNullOrWhiteSpace($previous)) {
            if ($previous -notmatch '^[0-9A-Fa-f]{64}$') {
              throw 'SEAWORK_PUBLISHER_SHA256_PREVIOUS must be one SHA-256 certificate thumbprint'
            }
            if ($previous -ieq $publisher) {
              throw 'current and previous SeaWork publisher thumbprints must differ'
            }
          }
      - run: yarn napi build --target ${{ matrix.target }} --platform --release --js index.js --dts index.d.ts
      - run: yarn patch-loader
      - name: Validate Windows service API
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: |
          yarn ava test/api-shape.spec.ts test/package-metadata.spec.ts test/startup.spec.ts
          yarn tsc --noEmit --project test/tsconfig.json
      - uses: actions/upload-artifact@v6
        with:
          name: bindings-nodejs-${{ matrix.target }}
          path: |
            bindings/nodejs/lsb-nodejs.*.node
            bindings/nodejs/index.js
            bindings/nodejs/index.d.ts
          if-no-files-found: error
