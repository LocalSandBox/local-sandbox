name: Publish Crates

on:
  workflow_call:
    inputs:
      ref:
        description: "Validated release commit"
        required: true
        type: string
      version:
        description: "Release version without the v prefix"
        required: true
        type: string
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io when configured
    runs-on: macos-14
    steps:
      - name: Check crates.io publishing configuration
        id: publishing
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -n "$CARGO_REGISTRY_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CARGO_REGISTRY_TOKEN is not configured; skipping crates.io publication"
          fi

      - uses: actions/checkout@v4
        if: steps.publishing.outputs.enabled == 'true'
        with:
          ref: ${{ inputs.ref }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.publishing.outputs.enabled == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.publishing.outputs.enabled == 'true'

      - name: Verify release versions
        if: steps.publishing.outputs.enabled == 'true'
        run: cargo run -p xtask -- release verify --version "${{ inputs.version }}"

      - name: Publish workspace crates
        if: steps.publishing.outputs.enabled == 'true'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          publish() {
            local crate="$1"
            cargo publish --locked -p "$crate" --dry-run
            if output="$(cargo publish --locked -p "$crate" 2>&1)"; then
              echo "Published $crate"
              echo "Waiting for crates.io to index..."
              sleep 30
            elif grep -q "already exists" <<< "$output"; then
              echo "$crate already published, skipping"
            else
              echo "$output" >&2
              return 1
            fi
          }

          publish lsb-proto
          publish lsb-platform
          publish lsb-proxy
          publish lsb-vm
          publish lsb-store
          publish lsb-sdk
